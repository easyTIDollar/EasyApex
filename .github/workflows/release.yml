name: Build & Release EasyApex APK

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '版本号标签 (例如 v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      - name: 重命名 APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/EasyApex-${{ inputs.tag_name }}.apk

      - name: 创建 Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.tag_name }}
          git push origin ${{ inputs.tag_name }}

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: app/build/outputs/apk/debug/EasyApex-${{ inputs.tag_name }}.apk
          name: EasyApex ${{ inputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false