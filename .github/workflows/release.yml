name: Build & Release EasyApex APK

# 触发条件：当你推送以 "v" 开头的标签 (如 v1.0.0) 时自动运行
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    # 赋予 GITHUB_TOKEN 创建 Release 的权限
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      # --- 关键重命名步骤：改为 EasyApex ---
      - name: 重命名 APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/EasyApex-${{ github.ref_name }}.apk

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # --- 发布改名后的 EasyApex APK ---
          files: app/build/outputs/apk/debug/EasyApex-${{ github.ref_name }}.apk
          name: EasyApex ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false